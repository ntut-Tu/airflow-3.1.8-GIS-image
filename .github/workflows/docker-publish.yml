name: Build and Publish Airflow Custom Image

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  AIRFLOW_IMAGE_NAME: airflow-gis
  WORKER_IMAGE_NAME: airflow-gis-worker
  SCAN_TAG: v.${{ github.run_number }}
  LOCAL_AIRFLOW_IMAGE: local/airflow-gis:${{ github.sha }}
  LOCAL_WORKER_IMAGE: local/airflow-gis-worker:${{ github.sha }}

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-image:
    if: ${{ github.ref == 'refs/heads/release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Normalize repository owner to lowercase
        id: repo-owner
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Airflow Base Image
      - name: Extract metadata for airflow image
        id: meta-airflow
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-owner.outputs.owner_lc }}/${{ env.AIRFLOW_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/release' }}
            type=sha,format=short,prefix=sha-
            type=raw,value=${{ env.SCAN_TAG }}

      - name: Build airflow image (Local Load)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ env.LOCAL_AIRFLOW_IMAGE }}

      - name: Report Installed Python Packages (Airflow)
        run: |
          echo "## Python Packages (Airflow Base)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          docker run --rm --entrypoint "" ${{ env.LOCAL_AIRFLOW_IMAGE }} bash -c "uv pip list || pip list" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run Trivy scan (Airflow)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.57.1 image \
            --ignore-unfixed --severity HIGH,CRITICAL --exit-code 0 \
            ${{ env.LOCAL_AIRFLOW_IMAGE }} > trivy-airflow.txt
          
          echo "## Trivy scan result (Airflow)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat trivy-airflow.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Push airflow image to Registry
        id: push-airflow
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-airflow.outputs.tags }}
          labels: ${{ steps.meta-airflow.outputs.labels }}

      # Worker Image
      - name: Extract metadata for worker image
        id: meta-worker
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo-owner.outputs.owner_lc }}/${{ env.WORKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/release' }}
            type=sha,format=short,prefix=sha-
            type=raw,value=${{ env.SCAN_TAG }}

      - name: Build worker image (Local Load)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          push: false
          load: true
          build-args: |
            BASE_AIRFLOW_IMAGE=${{ env.REGISTRY }}/${{ steps.repo-owner.outputs.owner_lc }}/${{ env.AIRFLOW_IMAGE_NAME }}@${{ steps.push-airflow.outputs.digest }}
          tags: ${{ env.LOCAL_WORKER_IMAGE }}

      - name: Report Installed Python Packages (Worker)
        run: |
          echo "## Python Packages (Worker)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          docker run --rm --entrypoint "" ${{ env.LOCAL_WORKER_IMAGE }} bash -c "uv pip list || pip list" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run Trivy scan (Worker)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.57.1 image \
            --ignore-unfixed --severity HIGH,CRITICAL --exit-code 0 \
            ${{ env.LOCAL_WORKER_IMAGE }} > trivy-worker.txt
          
          echo "## Trivy scan result (Worker)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat trivy-worker.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Push worker image to Registry
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          build-args: |
            BASE_AIRFLOW_IMAGE=${{ env.REGISTRY }}/${{ steps.repo-owner.outputs.owner_lc }}/${{ env.AIRFLOW_IMAGE_NAME }}@${{ steps.push-airflow.outputs.digest }}
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}